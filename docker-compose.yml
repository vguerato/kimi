# ─── Shift ──────────────────────────────────────────────────────────────────
#
# Serviços:
#   redis    — Fila de tarefas (BullMQ)
#   backend  — API + Worker (Node.js)
#   frontend — Interface web (Nginx)
#   weaviate — Memória semântica vetorial (opcional)
#   docs     — Documentação (Docusaurus)
# ─────────────────────────────────────────────────────────────────────────────

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    environment:
      - PORT=3001
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      - PUID=1000
      - PGID=1000
    volumes:
      - backend_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy
      weaviate:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - PUID=1000
      - PGID=1000
    ports:
      - "5173:80"
    depends_on:
      - backend

  # ─── Weaviate — Memória semântica vetorial ──────────────────────────────────
  weaviate:
    image: semitechnologies/weaviate:1.24.1
    ports:
      - "8080:8080"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'none'
      ENABLE_MODULES: ''
      CLUSTER_HOSTNAME: 'node1'
    volumes:
      - weaviate_data:/var/lib/weaviate

  # ─── Docusaurus — Documentação ───────────────────────────────────────────────
  # Acesse em: http://localhost:3002
  # Build estático servido via Nginx — sem dependência de npm em runtime.
  docs:
    build:
      context: ./docs
      dockerfile: Dockerfile
    environment:
      - PUID=1000
      - PGID=1000
    ports:
      - "3002:3002"

volumes:
  redis_data:
  backend_data:
  weaviate_data:
