version: '3.8'

# ─── Kiro AI — Backend v2 ─────────────────────────────────────────────────────
#
# Serviços:
#   redis    — Fila de tarefas (BullMQ)
#   backend  — API + Worker (Node.js)
#   frontend — Interface web (Nginx)
#   weaviate — Memória semântica vetorial (opcional)
#
# Mudanças em relação ao v1:
#   - Removidos volumes de /repos e /worktrees (não há mais clone local)
#   - Adicionado Weaviate para memória semântica
#   - Docker socket montado para containers efêmeros
# ─────────────────────────────────────────────────────────────────────────────

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env
    environment:
      - PORT=3001
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    volumes:
      # Dados persistentes (SQLite, memória local)
      - backend_data:/app/data
      # Docker socket para containers efêmeros
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      redis:
        condition: service_healthy
      weaviate:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend

  # ─── Weaviate — Memória semântica vetorial ──────────────────────────────────
  # Opcional: usado para busca semântica de contexto de projetos.
  # Se não configurado, o sistema usa memória local (JSON).
  weaviate:
    image: semitechnologies/weaviate:1.24.1
    ports:
      - "8080:8080"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'none'
      ENABLE_MODULES: ''
      CLUSTER_HOSTNAME: 'node1'
    volumes:
      - weaviate_data:/var/lib/weaviate

volumes:
  redis_data:
  backend_data:
  weaviate_data:
